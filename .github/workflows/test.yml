name: test

on:
  push:
  pull_request:

jobs:
  statusline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Syntax check
        run: python3 -m py_compile claude-statusline.py
      - name: Sample render
        run: |
          python3 claude-statusline.py < examples/sample-statusline.json
          NO_COLOR=1 python3 claude-statusline.py < examples/sample-statusline.json | grep "CTX"
